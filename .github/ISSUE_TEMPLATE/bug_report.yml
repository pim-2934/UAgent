name: Bug report
description: Something in UAgent is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        > **Before you submit:** a **plugin export** is required. Open UAgent in the editor and click the **Export** button to generate it, then paste the contents (or attach the file) in the field below. Reports without an export will be closed.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen instead?
      placeholder: "When I ... the editor ... but I expected ..."
    validations:
      required: true

  - type: textarea
    id: export
    attributes:
      label: Plugin export
      description: |
        Paste the full contents of the export generated by the **Export** button in the UAgent plugin, or drag-and-drop the exported file into this field. This is required — it contains the version, environment, and state we need to diagnose the issue.
      render: text
    validations:
      required: true

  - type: input
    id: ue-version
    attributes:
      label: Unreal Engine version
      placeholder: "e.g. 5.4.4"
    validations:
      required: true
