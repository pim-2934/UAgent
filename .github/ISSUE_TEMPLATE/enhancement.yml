name: Enhancement
description: Suggest a new feature or improvement for UAgent.
title: "[Enhancement]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > **Before you submit:** a **plugin export** is required. Open UAgent in the editor and click the **Export** button to generate it, then paste the contents (or attach the file) in the field below. Requests without an export will be closed.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What's missing or awkward today?
      placeholder: "I'm trying to ... but UAgent doesn't support ..."
    validations:
      required: true

  - type: textarea
    id: export
    attributes:
      label: Plugin export
      description: |
        Paste the full contents of the export generated by the **Export** button in the UAgent plugin, or drag-and-drop the exported file into this field. This is required — it captures the version and environment the request is framed against.
      render: text
    validations:
      required: true

  - type: input
    id: ue-version
    attributes:
      label: Unreal Engine version
      placeholder: "e.g. 5.4.4"
    validations:
      required: true
